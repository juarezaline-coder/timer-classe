<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="author" content="A Juarez">
<meta name="copyright" content="© A Juarez - Tous droits réservés">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:transparent;font-family:'Segoe UI',sans-serif;}
.bar{background:linear-gradient(135deg,#1a365d,#2b6cb0);padding:10px 16px 6px;border-radius:12px;box-shadow:0 4px 16px rgba(0,0,0,0.3);-webkit-app-region:drag;}
.top{display:flex;align-items:center;justify-content:space-between;}
.logo{color:white;font-weight:700;font-size:15px;display:flex;align-items:center;gap:8px;}
.btns{display:flex;gap:8px;-webkit-app-region:no-drag;}
button{font-family:'Segoe UI',sans-serif;font-weight:700;font-size:13px;border:none;border-radius:8px;padding:8px 14px;cursor:pointer;transition:all 0.15s;}
.btn-new{background:#38a169;color:white;}
.btn-new:hover{background:#276749;}
.btn-close{background:rgba(229,62,62,0.8);color:white;width:30px;padding:8px 0;}
.btn-close:hover{background:#e53e3e;}
.copyright{text-align:center;font-size:9px;color:rgba(255,255,255,0.4);margin-top:5px;-webkit-app-region:drag;}
</style>
</head>
<body>
<div class="bar">
  <div class="top">
    <div class="logo">⏱ Timers Classe</div>
    <div class="btns">
      <button class="btn-new" onclick="require('electron').ipcRenderer.send('new-timer')">✚ Nouveau Timer</button>
      <button class="btn-close" onclick="require('electron').ipcRenderer.send('quit')">✕</button>
    </div>
  </div>
  <div class="copyright">© A Juarez — Tous droits réservés</div>
</div>
</body>
</html>
